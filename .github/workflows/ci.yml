name: Chorduction v7 CI

on:
  push:
    branches: [main, master, 'v7*', 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Type-check (JSDoc + checkJs) ──────────────────────────────────────────
  typecheck:
    name: Type check (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - name: Run TypeScript type checker
        run: npm run typecheck

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - run: npm run lint

  # ── Unit + integration tests ──────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    strategy:
      fail-fast: false
      matrix:
        node: ['18.x', '20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary

      - name: Upload coverage to Codecov
        if: matrix.node == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: esbuild bundle
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - name: Build Spicetify extension
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < build/chorduction.js)
          echo "Bundle size: ${SIZE} bytes"
          # Fail if bundle exceeds 800 KB uncompressed
          if [ "$SIZE" -gt 819200 ]; then
            echo "Bundle size ${SIZE} exceeds 800 KB limit"
            exit 1
          fi

      - name: Build YouTube extension bundle
        run: npm run build:yt 2>/dev/null || echo "YT build script not yet wired (skip)"

      - name: Upload Spicetify bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: chorduction-spicetify-${{ github.sha }}
          path: build/chorduction.js
          retention-days: 14

  # ── Release (main/master only, on tag push) ────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package Spicetify release
        run: |
          mkdir -p dist/spicetify dist/youtube-extension
          cp build/chorduction.js dist/spicetify/
          cp README.md CHANGELOG.md LICENSE dist/
          cp -r youtube-extension dist/youtube-extension/chorduction-yt
          cd dist/youtube-extension && zip -r ../chorduction-yt-v${{ steps.ver.outputs.VERSION }}.zip chorduction-yt/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Chorduction v${{ steps.ver.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            dist/spicetify/chorduction.js
            dist/chorduction-yt-v${{ steps.ver.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
