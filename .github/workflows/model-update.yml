name: ML Model Update

on:
  schedule:
    # Run weekly on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset variant to use'
        required: false
        default: 'guitarset'

jobs:
  check-model:
    name: Evaluate current model quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt 2>/dev/null || echo "No requirements.txt yet"

      - name: Evaluate model accuracy
        id: eval
        run: |
          if [ -f scripts/evaluate_model.py ]; then
            python scripts/evaluate_model.py --output metrics.json
            ACC=$(python -c "import json; d=json.load(open('metrics.json')); print(d.get('accuracy', 0))")
            echo "ACCURACY=$ACC" >> $GITHUB_OUTPUT
          else
            echo "ACCURACY=N/A (script pending)" >> $GITHUB_OUTPUT
          fi

      - name: Report evaluation result
        run: echo "Model accuracy = ${{ steps.eval.outputs.ACCURACY }}"

      - name: Open issue if accuracy drops below 80%
        if: steps.eval.outputs.ACCURACY != 'N/A (script pending)'
        uses: actions/github-script@v7
        with:
          script: |
            const acc = parseFloat('${{ steps.eval.outputs.ACCURACY }}');
            if (!isNaN(acc) && acc < 0.80) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[ML] Model accuracy dropped to ${(acc*100).toFixed(1)}%`,
                body: `Automated weekly evaluation detected accuracy below 80%.\nPlease retrain or update the model bundle.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['ml', 'needs-attention'],
              });
            }
