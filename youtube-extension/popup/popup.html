<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chorduction for YouTube</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      min-height: 200px;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #2a2a2a;
    }

    header .logo { font-size: 18px; }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #1db954;
      letter-spacing: 0.3px;
    }

    header .version {
      margin-left: auto;
      font-size: 10px;
      color: #555;
    }

    /* Status section */
    #status-section {
      padding: 14px;
      border-bottom: 1px solid #1a1a1a;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active { background: #1db954; box-shadow: 0 0 6px #1db954; }
    .status-dot.loading { background: #f90; animation: pulse 1s infinite; }
    .status-dot.error { background: #e22; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-label { color: #888; font-size: 11px; }

    /* Chord display */
    #chord-section {
      padding: 16px 14px 12px;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
      min-height: 90px;
    }

    #chord-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    #chord-display {
      font-size: 36px;
      font-weight: 700;
      color: #1db954;
      line-height: 1;
      font-family: monospace;
      min-height: 44px;
    }

    #chord-display.no-data { color: #333; font-size: 28px; }

    #confidence-bar {
      margin-top: 8px;
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    #confidence-fill {
      height: 100%;
      background: #1db954;
      width: 0%;
      transition: width 0.4s ease;
    }

    #lyric-display {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      min-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px;
    }

    /* Settings */
    #settings-section {
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
    }

    .settings-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 8px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .setting-row label {
      color: #aaa;
      font-size: 12px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: #1db954; }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      top: 2px; left: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track::after { transform: translateX(14px); }

    /* Footer */
    footer {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer a {
      color: #444;
      text-decoration: none;
      font-size: 10px;
      transition: color 0.2s;
    }

    footer a:hover { color: #1db954; }

    #no-video-msg {
      padding: 24px 14px;
      text-align: center;
      color: #444;
      font-size: 12px;
      line-height: 1.6;
    }

    #no-video-msg .icon { font-size: 28px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <header>
    <span class="logo">🎸</span>
    <h1>Chorduction</h1>
    <span class="version">v7.0.0</span>
  </header>

  <div id="main-content">

    <div id="no-video-msg" hidden>
      <div class="icon">🎵</div>
      Open a YouTube music video to see chord detection in action.
    </div>

    <div id="active-content">

      <div id="status-section">
        <div class="status-row">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label" id="status-label">Connecting…</span>
        </div>
      </div>

      <div id="chord-section">
        <div id="chord-label">Current Chord</div>
        <div id="chord-display" class="no-data">—</div>
        <div id="confidence-bar"><div id="confidence-fill"></div></div>
        <div id="lyric-display"></div>
      </div>

      <div id="settings-section">
        <div class="settings-title">Settings</div>

        <div class="setting-row">
          <label for="toggle-overlay">Show overlay</label>
          <label class="toggle">
            <input type="checkbox" id="toggle-overlay" checked>
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="setting-row">
          <label for="toggle-lyrics">Show lyrics</label>
          <label class="toggle">
            <input type="checkbox" id="toggle-lyrics" checked>
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

    </div><!-- #active-content -->

  </div><!-- #main-content -->

  <footer>
    <a href="https://github.com/chorduction/chorduction" target="_blank" rel="noopener">GitHub</a>
    <a href="#" id="report-link">Report issue</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
